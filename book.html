<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book a Call — DVN Solutions</title>
  <meta name="description" content="Book a discovery call to map your Digital, Virtual, and Network maturity with DVN Solutions.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header" id="site-header"></header>
  <main>
    <section class="page-header">
      <div class="container section-heading center">
        <span class="eyebrow">Digital · Virtual · Network</span>
        <h2>Let's map your three dimensions</h2>
        <p>Every organization runs on Digital, Virtual, and Network. Tell us where you are across each — we'll recommend the right starting point.</p>
      </div>
    </section>
    <section class="section section-sm">
      <div class="container">
        <form class="form-card" id="booking-form">
          <div class="form-group">
            <label for="name">Full name</label>
            <input id="name" name="name" required>
          </div>
          <div class="form-group">
            <label for="email">Work email</label>
            <input id="email" name="email" type="email" required>
          </div>
          <div class="form-group">
            <label for="company">Company</label>
            <input id="company" name="company" required>
          </div>
          <div class="form-group">
            <label for="role">Your role</label>
            <input id="role" name="role" placeholder="e.g. Founder, CTO, COO">
          </div>
          <div class="form-group">
            <label for="stage">Which dimension needs the most attention?</label>
            <select id="stage" name="stage">
              <option value="">Select...</option>
              <option>Digital — brand, websites, software, AI, data</option>
              <option>Virtual — cloud, containers, CI/CD, networking</option>
              <option>Network — identity, trust, connections, automation</option>
              <option>Multiple dimensions — need unified integration</option>
              <option>Full lifecycle — Build through Automate</option>
              <option>Not sure — help me decide</option>
            </select>
          </div>
          <div class="form-group">
            <label for="service">Engagement type</label>
            <select id="service" name="service">
              <option value="">Select...</option>
              <option>Infrastructure Snapshot (Starter)</option>
              <option>Lifecycle Phase Engagement (Professional)</option>
              <option>CI/CD Retainer Partner (Premium)</option>
              <option>Full-Stack DVN Program (Enterprise)</option>
              <option>Not sure — help me decide</option>
            </select>
          </div>
          <div class="form-group">
            <label for="notes">Anything else we should know?</label>
            <textarea id="notes" name="notes" placeholder="Timeline, current stack, pain points, growth goals, etc."></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-lg btn-block">Submit Request</button>
        </form>
      </div>
    </section>
  </main>
  <footer class="site-footer" id="site-footer"></footer>
  <script src="script.js"></script>
</body>
</html>
