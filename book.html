<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book a Call — DVN Solutions</title>
  <meta name="description" content="Tell us about your environment and book a discovery call.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header" id="site-header"></header>
  <main>
    <section class="page-header">
      <div class="container section-heading center">
        <span class="eyebrow">Book a Call</span>
        <h2>Let's talk about your security architecture</h2>
        <p>Fill out a few details so we can make the most of our time together. We typically respond within one business day.</p>
      </div>
    </section>
    <section class="section section-sm">
      <div class="container">
        <form class="form-card" id="booking-form">
          <div class="form-group">
            <label for="name">Full name</label>
            <input id="name" name="name" required>
          </div>
          <div class="form-group">
            <label for="email">Work email</label>
            <input id="email" name="email" type="email" required>
          </div>
          <div class="form-group">
            <label for="company">Company</label>
            <input id="company" name="company" required>
          </div>
          <div class="form-group">
            <label for="role">Your role</label>
            <input id="role" name="role" placeholder="e.g. CTO, VP Engineering">
          </div>
          <div class="form-group">
            <label for="environment">Environment</label>
            <select id="environment" name="environment">
              <option value="">Select...</option>
              <option>AWS</option>
              <option>Azure</option>
              <option>GCP</option>
              <option>Multi-cloud</option>
              <option>On-prem / hybrid</option>
            </select>
          </div>
          <div class="form-group">
            <label for="service">Service of interest</label>
            <select id="service" name="service">
              <option value="">Select...</option>
              <option>Security Snapshot (Starter)</option>
              <option>Security Architecture Review</option>
              <option>Fractional Security Architect</option>
              <option>Enterprise / C2C</option>
              <option>Not sure — help me decide</option>
            </select>
          </div>
          <div class="form-group">
            <label for="notes">Anything else we should know?</label>
            <textarea id="notes" name="notes" placeholder="Timeline, compliance requirements, recent incidents, etc."></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-lg btn-block">Submit Request</button>
        </form>
      </div>
    </section>
  </main>
  <footer class="site-footer" id="site-footer"></footer>
  <script src="script.js"></script>
</body>
</html>
