<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book a Call — DVN Solutions</title>
  <meta name="description" content="Tell us about your business and book a discovery call to map your digital infrastructure lifecycle.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header" id="site-header"></header>
  <main>
    <section class="page-header">
      <div class="container section-heading center">
        <span class="eyebrow">Book a Call</span>
        <h2>Let's map your digital infrastructure lifecycle</h2>
        <p>Fill out a few details so we can make the most of our time together. We typically respond within one business day.</p>
      </div>
    </section>
    <section class="section section-sm">
      <div class="container">
        <form class="form-card" id="booking-form">
          <div class="form-group">
            <label for="name">Full name</label>
            <input id="name" name="name" required>
          </div>
          <div class="form-group">
            <label for="email">Work email</label>
            <input id="email" name="email" type="email" required>
          </div>
          <div class="form-group">
            <label for="company">Company</label>
            <input id="company" name="company" required>
          </div>
          <div class="form-group">
            <label for="role">Your role</label>
            <input id="role" name="role" placeholder="e.g. Founder, CTO, COO">
          </div>
          <div class="form-group">
            <label for="stage">Where are you in the lifecycle?</label>
            <select id="stage" name="stage">
              <option value="">Select...</option>
              <option>Build — need websites, apps, or tools built</option>
              <option>Deploy — need cloud, hosting, or CI/CD</option>
              <option>Secure — need security, compliance, or IAM</option>
              <option>Optimize — need SEO, performance, or cost tuning</option>
              <option>Automate — need workflows, AI agents, or ops automation</option>
              <option>Multiple phases — need an integrated partner</option>
              <option>Not sure — help me decide</option>
            </select>
          </div>
          <div class="form-group">
            <label for="service">Engagement type</label>
            <select id="service" name="service">
              <option value="">Select...</option>
              <option>Infrastructure Snapshot (Starter)</option>
              <option>Lifecycle Phase Engagement (Professional)</option>
              <option>DIaaS Partner Retainer (Premium)</option>
              <option>Enterprise / Full-Stack Program</option>
              <option>Not sure — help me decide</option>
            </select>
          </div>
          <div class="form-group">
            <label for="notes">Anything else we should know?</label>
            <textarea id="notes" name="notes" placeholder="Timeline, current stack, pain points, growth goals, etc."></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-lg btn-block">Submit Request</button>
        </form>
      </div>
    </section>
  </main>
  <footer class="site-footer" id="site-footer"></footer>
  <script src="script.js"></script>
</body>
</html>
