<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Services — DVN Solutions</title>
  <meta name="description" content="Build, deploy, secure, optimize, and automate your digital infrastructure — organized around business lifecycle outcomes, not technology silos.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header" id="site-header"></header>
  <main>
    <section class="page-header">
      <div class="container section-heading center">
        <span class="eyebrow">Service Catalog</span>
        <h2>Where are you in your business lifecycle?</h2>
        <p>Every engagement is organized around outcomes — build, deploy, secure, optimize, and automate — not a menu of disconnected technologies.</p>
      </div>
    </section>
    <section class="section section-sm">
      <div class="container" id="services-list"></div>
    </section>
  </main>
  <footer class="site-footer" id="site-footer"></footer>
  <script src="script.js"></script>
  <script>
    const PHASE_DETAILS = {
      build: {
        description: "Design and create the digital foundation your business runs on — websites, applications, cloud environments, AI agents, CRM systems, branding, and identity infrastructure.",
        outcomes: ["Production-ready websites and web applications", "Branded digital presence aligned to your market", "CRM and internal tools tailored to your workflows", "AI agents and apps built for your use cases"],
        deliverables: ["Website & application builds", "Brand identity & design systems", "CRM setup & configuration", "AI agent prototypes", "Internal tool development"],
        idealFor: "New ventures · Rebrands · Teams outgrowing off-the-shelf tools · Companies launching new products"
      },
      deploy: {
        description: "Get your infrastructure live and repeatable — hosting, cloud provisioning, CI/CD pipelines, Kubernetes, virtualization, networking, domains, and email systems deployed with confidence.",
        outcomes: ["Reliable, scalable hosting and cloud environments", "Automated CI/CD pipelines for code and infrastructure", "Container orchestration and networking configured correctly", "Domains, DNS, and email systems production-ready"],
        deliverables: ["Cloud environment provisioning", "CI/CD pipeline setup", "Kubernetes & container deployment", "Network architecture & VPN", "Domain, DNS & email configuration"],
        idealFor: "Teams moving from dev to production · Cloud migrations · Startups scaling past MVP · Companies standardizing deployments"
      },
      secure: {
        description: "Protect every layer of your digital stack — IAM, GRC, vulnerability management, penetration testing, monitoring, SOC operations, and compliance frameworks built in, not bolted on.",
        outcomes: ["Identity and access controls enforced across all systems", "Compliance readiness for SOC 2, HIPAA, and enterprise questionnaires", "Vulnerability and exposure management with clear priorities", "Detection, monitoring, and incident response operational"],
        deliverables: ["IAM & access reviews", "GRC framework mapping", "Vulnerability assessments", "Penetration testing", "SOC & monitoring setup"],
        idealFor: "Pre-fundraise startups · Pre-audit companies · Enterprise sales cycles · Post-incident remediation"
      },
      optimize: {
        description: "Make your digital infrastructure work harder — SEO, analytics, cloud cost optimization, performance tuning, user experience improvements, and business intelligence dashboards.",
        outcomes: ["Search visibility and organic traffic growth", "Cloud spend reduced without sacrificing performance", "Application and infrastructure performance tuned", "Executive dashboards with actionable business intelligence"],
        deliverables: ["SEO audits & implementation", "Analytics & tracking setup", "Cloud cost optimization review", "Performance tuning", "UX & conversion improvements"],
        idealFor: "Growing businesses with rising cloud bills · Sites with traffic but low conversion · Teams needing data-driven decisions · Companies post-launch seeking traction"
      },
      automate: {
        description: "Free your team from repetitive work — AI agents, workflow automation, CRM automation, marketing automation, business process automation, and automated reporting across your operations.",
        outcomes: ["AI agents handling customer and internal workflows", "Marketing and CRM processes running on autopilot", "Business processes automated end-to-end", "Automated reporting replacing manual spreadsheets"],
        deliverables: ["AI agent development & deployment", "Workflow automation (Zapier, n8n, custom)", "CRM & marketing automation", "Business process automation", "Automated reporting & dashboards"],
        idealFor: "Teams drowning in manual ops · Sales & marketing needing scale · Companies adopting AI · Businesses ready to run leaner"
      }
    };

    document.getElementById("services-list").innerHTML = LIFECYCLE_PHASES.map(p => {
      const d = PHASE_DETAILS[p.slug];
      return `<article class="card service-card" id="${p.slug}" style="margin-bottom:2rem">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem">
          <div style="display:flex;align-items:center;gap:1rem">
            <div class="card-icon accent">${p.icon}</div>
            <div>
              <h3 style="font-size:1.5rem">${p.name}</h3>
              <p style="font-size:0.875rem;color:var(--muted-foreground);margin-top:0.25rem">${p.summary}</p>
            </div>
          </div>
          <span class="badge badge-outline">${p.timeline}</span>
        </div>
        <p style="margin-top:1.5rem">${d.description}</p>
        <div class="deliverable-tags" style="margin-top:1rem">${p.capabilities.map(c => `<span>${c}</span>`).join("")}</div>
        <p style="margin-top:1.5rem;font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted-foreground)">Key outcomes</p>
        <ul style="margin-top:0.5rem">${d.outcomes.map(o => `<li style="display:flex;gap:0.5rem;font-size:0.875rem;margin-top:0.5rem"><span class="check-icon">✓</span>${o}</li>`).join("")}</ul>
        <p style="margin-top:1rem;font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted-foreground)">Deliverables</p>
        <div class="deliverable-tags">${d.deliverables.map(x => `<span>${x}</span>`).join("")}</div>
        <p style="margin-top:1rem;font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted-foreground)">Ideal for</p>
        <p style="font-size:0.875rem;margin-top:0.25rem;color:var(--muted-foreground)">${d.idealFor}</p>
        <div style="margin-top:1.5rem;display:flex;gap:0.75rem;flex-wrap:wrap">
          <a href="book.html" class="btn btn-primary btn-sm">Book a Call →</a>
          <a href="pricing.html" class="btn btn-outline btn-sm">View Pricing</a>
        </div>
      </article>`;
    }).join("");
  </script>
</body>
</html>
